  <polygon points="62,40 70,52 78,44 74,32 70,30" fill="#1a1a1a" opacity="0.4"/>
  <polygon points="58,54 64,66 74,60 70,52 62,40" fill="#1a1a1a" opacity="0.4"/>
  <polygon points="42,54 36,66 26,60 30,52 38,40" fill="#1a1a1a" opacity="0.4"/>
  <polygon points="38,40 30,52 22,44 26,32 30,30" fill="#1a1a1a" opacity="0.4"/>
