  <circle cx="50" cy="50" r="46" fill="none" stroke="#FFD700" stroke-width="3"/>
  <!-- Football/Soccer ball -->
  <circle cx="50" cy="50" r="28" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Pentagon center -->
